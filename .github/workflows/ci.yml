name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --all-groups
      - run: |
          if find mastermind/ -name "*.py" | grep -q .; then
            uv run mypy mastermind/
          else
            echo "mypy: no Python sources yet, skipping"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --all-groups
      - run: |
          if find mastermind/ -name "*.py" | grep -q .; then
            uv run pytest tests/unit tests/integration --cov=mastermind --cov-fail-under=80 || ec=$?
          else
            uv run pytest tests/unit tests/integration --no-cov || ec=$?
          fi
          [ "${ec:-0}" -eq 0 ] || [ "${ec:-0}" -eq 5 ]
