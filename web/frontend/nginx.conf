server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the backend Django container.
    # Cookie forwarding is required so Django sessions work across the proxy.
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # SPA fallback: serve index.html for any path not matched above so
    # client-side React Router routes work on direct navigation or reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
