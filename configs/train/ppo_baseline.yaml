# Environment settings — define the game configuration and reward function
env:
  n_colors: 6         # number of peg colors (code space = n_colors^n_pegs)
  n_pegs: 4           # number of pegs per code
  max_steps: 8        # maximum guesses before truncation
  reward_variant: step_penalty  # sparse | step_penalty | shaped | information
  win_bonus: 1.0      # reward on solving the code
  step_penalty: -0.1  # per-step penalty to discourage slow solving
  lose_penalty: -1.0  # applied on truncation when reward_variant=shaped

# MaskablePPO hyperparameters
ppo:
  learning_rate: 3.0e-4   # Adam learning rate
  n_steps: 2048           # rollout buffer size (steps collected before each update)
  batch_size: 64          # minibatch size for gradient updates
  n_epochs: 10            # number of passes over the rollout buffer per update
  gamma: 1.0              # discount factor; 1.0 is appropriate for short episodic tasks
  gae_lambda: 0.95        # GAE lambda for advantage estimation
  clip_range: 0.2         # PPO clip ratio
  ent_coef: 0.01          # entropy bonus coefficient to encourage exploration
  vf_coef: 0.5            # value function loss weight
  max_grad_norm: 0.5      # gradient clipping threshold

# Training run settings
training:
  total_timesteps: 1000000  # total environment steps to train for
  eval_freq: 10000          # evaluate every N timesteps
  n_eval_episodes: 100      # episodes per evaluation run
  seed: 42                  # random seed for reproducibility
  output_dir: outputs       # directory for model checkpoints and logs

# Weights & Biases logging
wandb:
  project: mastermind-rl
  entity: null              # set to your W&B username or team name
  tags:
    - ppo
    - baseline
    - test
  enabled: true
