env:
  n_colors: 6
  n_pegs: 4
  max_steps: 8
  reward_variant: step_penalty
  win_bonus: 1.0
  step_penalty: -0.1
  lose_penalty: -1.0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 1.0
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

training:
  total_timesteps: 1000000
  eval_freq: 10000
  n_eval_episodes: 100
  seed: 42
  output_dir: outputs

wandb:
  project: mastermind-rl
  entity: null
  tags:
    - ppo
    - baseline
    - test
  enabled: true
