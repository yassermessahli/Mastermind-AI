repos:
  - repo: local
    hooks:
      # Lint Python files with ruff; --fix applies safe auto-fixes before committing
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        stages: [pre-commit]
        types: [python]
        args: [--fix]

      # Format Python files with ruff to enforce consistent style
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        stages: [pre-commit]
        types: [python]

      # Type-check the mastermind package; pass_filenames=false runs mypy on the whole package
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        stages: [pre-commit]
        types: [python]
        pass_filenames: false
        args: [mastermind/]

      # Spell-check commit messages using the .codespellrc ignore list
      - id: codespell-commit-msg
        name: codespell commit message
        entry: uv run codespell --config .codespellrc
        language: system
        stages: [commit-msg]
